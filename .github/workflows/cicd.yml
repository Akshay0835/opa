name: OPA Policy Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  policy-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install Conftest
        run: |
          go install github.com/open-policy-agent/conftest/cmd/conftest@v0.67.0
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Verify Installation
        run: conftest --version

      - name: Run OPA Policy Check
        run: |
          conftest test config.json --policy policy/